<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <form action="" method="post">
        <div>
            <label for="txtNombre">
                <b>Nombre:</b>
            </label>

            <input type="text" name="txtNombre"  id="txtNombre"   class="" placeholder="Ingresa tu nombre" required>

            <br><br>
            <label for="txtApellido">
                <b>Apellido:</b>
            </label>
            
            <input type="text" name="txtApellido"  id="txtApellido"   class="" placeholder="Ingresa tu apellido" required>
        </div>
        
        <div>
            <br><br>
            <label for="txtCorreo">
                <b>Email:</b>
            </label>

            <input type="email" name="txtCorreo"  id="txtCorreo"   class="" placeholder="Ingresa tu correo" required>
            <br><br>
            <label for="txtPass">
                <b>Contraseña:</b>
            </label>

            <input type="password" name="txtPass"  id="txtPass"   class="" placeholder="Ingresa tu contraseña" required>
        </div>
        
        <div>
            <br><br>
            <label for="dateNacimiento">
                <b>Fecha de nacimiento:</b>
            </label>
            <input type="date" name="dateNacimiento" id="dateNacimiento" required>
        </div>

        <div>
            <br><br>
            <input type="submit" value="Enviar">
        </div>
    </form>
</body>
</html>
